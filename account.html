<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Login</h1>
    <div>
        <button id="discordLogin">Login with Discord</button>
        <button id="robloxLogin">Login with Roblox</button>
    </div>
    <script>
        $(document).ready(function() {
            $('#discordLogin').click(function() {
                // Redirect to Discord OAuth 2.0
                window.location.href = 'https://discord.com/oauth2/authorize?client_id=YOUR_CREDENTIALS&redirect_uri=YOUR_REDIRECT_URI&response_type=code&scope=identify';
            });
            $('#robloxLogin').click(function() {
                // Redirect to Roblox OAuth 2.0
                window.location.href = 'https://www.roblox.com/oauth/authorize?client_id=YOUR_CREDENTIALS&redirect_uri=YOUR_REDIRECT_URI&response_type=code&scope=identify';
            });
        });
    </script>
</body>
</html>
