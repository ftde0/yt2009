<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yt2009 mplayer-sabr</title>
    <style>
        body {
            background-color: black;
        }
        video {
            background-color: black;
            position: absolute;
            left: 0px;
            top: 0px;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <video class="v-i-playback" controls autoplay playsinline></video>
    <script src="mplayer.js"></script>
    <script>
        window.sabrHd = (location.href.indexOf("hd=1") !== -1)
        initMplayer(decodeURIComponent(
            location.href.split("sabr_url=")[1].split("&")[0].split("#")[0]
        ))
    </script>
</body>
</html>
